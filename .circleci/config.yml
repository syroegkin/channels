version: 2.1

# Two jobs:
#   * offline-tests — runs on every push/PR, no network, fast (< 1s).
#     Covers field-mapping / parser correctness via recorded fixtures.
#   * live-tests   — hits real third-party services. Runs on pushes to main
#     and on a nightly schedule so API drift / outages get surfaced without
#     making every PR flaky.

executors:
  python:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/repo

jobs:
  offline-tests:
    executor: python
    steps:
      - checkout
      - restore_cache:
          keys:
            - pip-v1-{{ checksum "hub/channels/requirements-dev.txt" }}
      - run:
          name: Install dev dependencies
          command: |
            cd hub/channels
            pip install --user -r requirements-dev.txt
      - save_cache:
          key: pip-v1-{{ checksum "hub/channels/requirements-dev.txt" }}
          paths:
            - ~/.cache/pip
      - run:
          name: Run offline tests
          command: |
            cd hub/channels
            python -m pytest -v --junitxml=test-results/offline.xml
      - store_test_results:
          path: hub/channels/test-results

  live-tests:
    executor: python
    steps:
      - checkout
      - restore_cache:
          keys:
            - pip-v1-{{ checksum "hub/channels/requirements-dev.txt" }}
      - run:
          name: Install dev dependencies
          command: |
            cd hub/channels
            pip install --user -r requirements-dev.txt
      - save_cache:
          key: pip-v1-{{ checksum "hub/channels/requirements-dev.txt" }}
          paths:
            - ~/.cache/pip
      - run:
          name: Run live integration tests
          command: |
            cd hub/channels
            python -m pytest --live -v --junitxml=test-results/live.xml
      - store_test_results:
          path: hub/channels/test-results

workflows:
  build:
    jobs:
      - offline-tests
      # Live tests on main only — keeps PR runs deterministic.
      - live-tests:
          filters:
            branches:
              only:
                - main
                - master
          requires:
            - offline-tests

  nightly-live-check:
    # Detects upstream API/HTML changes or service outages overnight.
    triggers:
      - schedule:
          cron: "0 4 * * *"
          filters:
            branches:
              only:
                - main
                - master
    jobs:
      - live-tests
