name: tests

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Nightly live-test run to catch upstream API drift or outages.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      run_live:
        description: "Run live tests too"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  offline:
    name: offline tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub/channels
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: hub/channels/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run offline tests
        run: pytest -v --junitxml=test-results/offline.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-offline
          path: hub/channels/test-results/offline.xml

  live:
    name: live tests
    # Gate to scheduled runs, pushes to main, or manual dispatch with the flag.
    # No use of untrusted user-supplied content in run: commands below.
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && inputs.run_live)
    needs: offline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hub/channels
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: hub/channels/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run live tests
        run: pytest --live -v --junitxml=test-results/live.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-live
          path: hub/channels/test-results/live.xml
